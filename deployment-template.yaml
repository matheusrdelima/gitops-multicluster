apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hello.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hello.labels" . | nindent 4 }}
  annotations:
    {{- include "hello.annotations" . | nindent 4 }}
    {{- if .Values.shadow }}
    traffic.description: "SHADOW: Recebe tráfego ESPELHADO. Respostas descartadas."
    {{- else }}
    traffic.description: "REAL: Recebe tráfego REAL ({{ .Values.weight }}%)"
    {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "hello.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "hello.selectorLabels" . | nindent 8 }}
        traffic.role: {{ if .Values.shadow }}shadow{{ else }}real{{ end }}
        cluster.name: {{ .Values.cluster }}
      annotations:
        rollme: {{ .Values | toYaml | sha256sum | trunc 8 | quote }}
        sidecar.istio.io/inject: "true"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "hello.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: hello
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: {{ .Values.version | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.cluster | quote }}
            - name: TRAFFIC_ROLE
              value: {{ if .Values.shadow }}"shadow"{{ else }}"real"{{ end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds:       {{ .Values.probes.readiness.periodSeconds }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
