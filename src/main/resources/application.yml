server:
  port: 8080

app:
  version: ${APP_VERSION:v1-local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{version}] %logger{36} - %msg%n"
  level:
    com.example: DEBUG
